server {
    listen 80;
    server_name _;

    # Re-resolve Docker service names so backend/frontend restarts do not leave stale upstream IPs.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 代理超时设置
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # 带前缀的 API 转发，去掉 /freedom 前缀
    location /freedom/api/ {
        set $backend_upstream backend:9000;
        rewrite ^/freedom/api/(.*)$ /api/$1 break;
        proxy_pass http://$backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 带前缀的前端路由，保留路径给 Next.js basePath=/freedom
    location /freedom/ {
        set $frontend_upstream frontend:3000;
        proxy_pass http://$frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket 支持（Next.js 热更新需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
