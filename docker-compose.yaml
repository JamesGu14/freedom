services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    expose:
      - "9000"
    environment:
      TUSHARE_TOKEN: e14d179a9b5acda0028ea672ecb535d9541402ba5e15e31687a4439e
      DATA_DIR: /data
      DUCKDB_PATH: /data/quant.duckdb
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://james:2x%23fdksma%21@mongodb:27017/?authSource=admin
    volumes:
      - ./data:/data
    depends_on:
      - redis
      - mongodb

  scheduler:
    build:
      context: ./backend
    command: ["python", "/app/scripts/scheduler.py"]
    environment:
      TUSHARE_TOKEN: e14d179a9b5acda0028ea672ecb535d9541402ba5e15e31687a4439e
      DATA_DIR: /data
      DUCKDB_PATH: /data/quant.duckdb
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://james:2x%23fdksma%21@mongodb:27017/?authSource=admin
    volumes:
      - ./data:/data
    depends_on:
      - redis
      - mongodb

  frontend:
    build:
      context: ./frontend
    expose:
      - "3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: /api
    depends_on:
      - backend

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: james
      MONGO_INITDB_ROOT_PASSWORD: 2x#fdksma!
    volumes:
      - ./data/mongo:/data/db

volumes:
  redis-data:
