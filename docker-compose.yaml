services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    networks:
      default:
      proxy:
        aliases:
          - freedom-app

  backend:
    build:
      context: ./backend
    expose:
      - "9000"
    environment:
      TUSHARE_TOKEN: ${TUSHARE_TOKEN}
      DATA_DIR: /data
      DUCKDB_PATH: /data/quant.duckdb
      REDIS_URL: redis://shared-redis:6379/1
      MONGODB_URL: mongodb://james:2x%23fdksma%21@mongodb:27017/?authSource=admin
      ACCESS_TOKEN_EXPIRES_MINUTES: 2880
      AI_RUNNER_BASE_URL: ${AI_RUNNER_BASE_URL:-http://host.docker.internal:18600}
      AI_RUNNER_TOKEN: ${AI_RUNNER_TOKEN:-}
      AI_RUNNER_TIMEOUT_SECONDS: ${AI_RUNNER_TIMEOUT_SECONDS:-90}
      AI_RUNNER_MAX_RETRIES: ${AI_RUNNER_MAX_RETRIES:-2}
      AUTH_LOGIN_URL: ${AUTH_LOGIN_URL:-http://personal-authenticator-app:3900/v1/auth/login}
      AUTH_VERIFY_URL: ${AUTH_VERIFY_URL:-http://personal-authenticator-app:3900/v1/internal/verify}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
    depends_on:
      - mongodb
    networks:
      default:
      proxy:
      shared-infra:

  scheduler:
    build:
      context: ./backend
    command: ["python", "/app/scripts/scheduler.py"]
    profiles: ["legacy"]
    environment:
      TUSHARE_TOKEN: ${TUSHARE_TOKEN}
      DATA_DIR: /data
      DUCKDB_PATH: /data/quant.duckdb
      REDIS_URL: redis://shared-redis:6379/1
      MONGODB_URL: mongodb://james:2x%23fdksma%21@mongodb:27017/?authSource=admin
      ACCESS_TOKEN_EXPIRES_MINUTES: 2880
      AI_RUNNER_BASE_URL: ${AI_RUNNER_BASE_URL:-http://host.docker.internal:18600}
      AI_RUNNER_TOKEN: ${AI_RUNNER_TOKEN:-}
      AI_RUNNER_TIMEOUT_SECONDS: ${AI_RUNNER_TIMEOUT_SECONDS:-90}
      AI_RUNNER_MAX_RETRIES: ${AI_RUNNER_MAX_RETRIES:-2}
      AUTH_LOGIN_URL: ${AUTH_LOGIN_URL:-http://personal-authenticator-app:3900/v1/auth/login}
      AUTH_VERIFY_URL: ${AUTH_VERIFY_URL:-http://personal-authenticator-app:3900/v1/internal/verify}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/data
    depends_on:
      - mongodb
    networks:
      default:
      proxy:
      shared-infra:

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: /freedom/api
    expose:
      - "3000"
    depends_on:
      - backend

  postgres:
    image: postgres:15-alpine
    profiles: ["legacy-airflow"]
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow-postgres-data:/var/lib/postgresql/data

  airflow-init:
    image: apache/airflow:2.9.3
    profiles: ["legacy-airflow"]
    depends_on:
      - postgres
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__RBAC: "True"
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username admin --password admin --firstname Air --lastname Flow --role Admin --email admin@example.com || true"
    volumes:
      - ./backend/airflow/dags:/opt/airflow/dags
      - ./data/airflow/logs:/opt/airflow/logs
      - ./data/airflow/plugins:/opt/airflow/plugins
    restart: "no"

  airflow-webserver:
    image: apache/airflow:2.9.3
    profiles: ["legacy-airflow"]
    depends_on:
      - postgres
      - airflow-init
      - backend
    ports:
      - "8088:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_WEBSERVER_SECRET_KEY:-change-me}
      FREEDOM_BACKEND_API_BASE: http://backend:9000/api
      FREEDOM_API_KEY: ${FREEDOM_API_KEY:-}
    command: webserver
    volumes:
      - ./backend/airflow/dags:/opt/airflow/dags
      - ./data/airflow/logs:/opt/airflow/logs
      - ./data/airflow/plugins:/opt/airflow/plugins

  airflow-scheduler:
    image: apache/airflow:2.9.3
    profiles: ["legacy-airflow"]
    depends_on:
      - postgres
      - airflow-init
      - backend
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "False"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
      FREEDOM_BACKEND_API_BASE: http://backend:9000/api
      FREEDOM_API_KEY: ${FREEDOM_API_KEY:-}
    command: scheduler
    volumes:
      - ./backend/airflow/dags:/opt/airflow/dags
      - ./data/airflow/logs:/opt/airflow/logs
      - ./data/airflow/plugins:/opt/airflow/plugins

  redis:
    image: redis:7-alpine
    profiles: ["legacy-local-state"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: james
      MONGO_INITDB_ROOT_PASSWORD: 2x#fdksma!
    volumes:
      - ./data/mongo:/data/db

  qinglong:
    image: whyour/qinglong:latest
    ports:
      - "5700:5700"
    environment:
      QlBaseUrl: "/"
    volumes:
      - ./data/qinglong:/ql/data
    restart: unless-stopped

volumes:
  redis-data:
  airflow-postgres-data:

networks:
  proxy:
    external: true
  shared-infra:
    external: true
